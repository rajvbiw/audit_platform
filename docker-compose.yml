version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: audit-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audit_platform
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: audit-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: audit-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/audit_platform
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - JWT_SECRET=super_secret_jwt_key
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    volumes:
      - ./backend/exports:/usr/src/app/exports

  worker:
    build: ./backend
    container_name: audit-worker
    restart: always
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/audit_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend/exports:/usr/src/app/exports

  frontend:
    build: ./frontend
    container_name: audit-frontend
    restart: always
    ports:
      - "3074:80"
    depends_on:
      - backend

volumes:
  postgres_data:
